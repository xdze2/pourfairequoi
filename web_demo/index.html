<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pfq</title>
<style>
  :root {
    --bg:        #0d1b2a;
    --bg-panel:  #111f2e;
    --fg:        #d4cdb8;
    --fg-dim:    #4a5a6a;
    --fg-mid:    #8a9aaa;
    --accent:    #2e4a66;
    --selected-bg: #1c2d40;
    --cursor-bg: #2e2600;
    --cursor-fg: #f0ead0;

    --c-done:      #7ec87f;
    --c-discarded: #555555;
    --c-overdue:   #c47a7a;
    --c-forgotten: #9b8a3a;
    --c-slowing:   #c4b870;
    --c-active:    #7ab8d4;

    --font: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 180px;
    background: var(--bg-panel);
    border-right: 1px solid var(--accent);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .2s ease, min-width .2s ease;
  }
  #sidebar.collapsed {
    width: 36px;
    min-width: 36px;
  }
  #sidebar.collapsed #search-wrap,
  #sidebar.collapsed #node-list { display: none; }

  #sidebar-header {
    padding: 8px 10px;
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  #sidebar-header:hover { color: var(--fg-mid); }
  #sidebar-title { overflow: hidden; }
  #sidebar.collapsed #sidebar-title { display: none; }
  #toggle-btn {
    flex-shrink: 0;
    color: var(--fg-dim);
    font-size: 14px;
    line-height: 1;
  }

  #search-wrap {
    padding: 6px 8px;
    border-bottom: 1px solid var(--accent);
    flex-shrink: 0;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    padding: 3px 6px;
    outline: none;
  }
  #search:focus { border-color: var(--c-active); }

  #node-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .node-item {
    padding: 3px 12px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
    color: var(--fg-mid);
  }
  .node-item:hover { background: var(--accent); color: var(--fg); }
  .node-item.active { background: var(--selected-bg); color: var(--fg); }

  /* ── Main view ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
  }

  #breadcrumb {
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 8px;
    min-height: 16px;
  }
  #breadcrumb span { cursor: pointer; }
  #breadcrumb span:hover { color: var(--fg-mid); }

  /* ── Cards ── */
  #tree {
    display: flex;
    flex-direction: column;
  }

  .card {
    padding: 3px 0;
    cursor: default;
    border-radius: 3px;
  }
  .card:hover { background: var(--selected-bg); }
  .card.selected { background: var(--selected-bg); }
  .card.clickable { cursor: pointer; }

  .card-line1,
  .card-line2,
  .card-line3 {
    display: flex;
    align-items: baseline;
    white-space: pre;
    line-height: 1.5;
  }
  .card-line2,
  .card-line3 {
    font-size: 12px;
  }

  /* sentinel divider */
  .sentinel-card {
    color: var(--fg-dim);
    padding: 6px 0 4px;
    font-size: 12px;
  }

  /* connector chars */
  .connector      { color: var(--fg-dim); }
  .connector-deep { color: #2a3a4a; }

  /* desc text by depth */
  .desc-d0        { color: var(--fg); }
  .desc-d1        { color: #eaeaea; }
  .desc-d2        { color: #b4b4b4; }
  .desc-selected  { color: var(--fg); font-weight: bold; }
  .selected-glyph { color: var(--fg); font-weight: bold; }

  .also { color: #505050; }

  /* comment line */
  .card-comment {
    color: #505a60;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  /* pulse + when line */
  .card-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .card-pulse { flex: 0 0 auto; }
  .card-when  { flex: 0 0 auto; margin-left: auto; }

  /* pulse colours */
  .pulse-overdue  { color: var(--c-overdue); }
  .pulse-forgotten{ color: var(--c-forgotten); }
  .pulse-active   { color: var(--c-active); }

  /* when colours */
  .when-done      { color: var(--c-done); }
  .when-discarded { color: var(--c-discarded); }
  .when-overdue   { color: var(--c-overdue); }
  .when-open      { color: #5a9aaa; }

  /* home button */
  #home-btn {
    display: inline-block;
    margin-bottom: 10px;
    padding: 2px 10px;
    font-size: 12px;
    font-family: var(--font);
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--fg-mid);
    border-radius: 3px;
    cursor: pointer;
  }
  #home-btn:hover { border-color: var(--c-active); color: var(--fg); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <span id="sidebar-title">pfq</span>
    <span id="toggle-btn">‹</span>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="search…" autocomplete="off" spellcheck="false">
  </div>
  <div id="node-list"></div>
</nav>

<main id="main">
  <div id="breadcrumb"></div>
  <button id="home-btn">⌂ home</button>
  <div id="tree"></div>
</main>

<script>
// ── Data loading ───────────────────────────────────────────────────────────────

let DATA = null;
let currentView = "home";   // "home" | node_id

async function loadData() {
  const resp = await fetch("data.json");
  DATA = await resp.json();
  populateNodeList(DATA.nodes);
  renderView("home");
}

// ── Sidebar ────────────────────────────────────────────────────────────────────

function populateNodeList(nodes) {
  const list = document.getElementById("node-list");
  list.innerHTML = "";
  for (const n of nodes) {
    const el = document.createElement("div");
    el.className = "node-item";
    el.textContent = n.description || n.node_id;
    el.dataset.nodeId = n.node_id;
    el.addEventListener("click", () => renderView(n.node_id));
    list.appendChild(el);
  }
}

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  for (const el of document.querySelectorAll(".node-item")) {
    const match = !q || el.textContent.toLowerCase().includes(q);
    el.style.display = match ? "" : "none";
  }
});

function setActiveSidebarItem(nodeId) {
  for (const el of document.querySelectorAll(".node-item")) {
    el.classList.toggle("active", el.dataset.nodeId === nodeId);
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────────

document.getElementById("home-btn").addEventListener("click", () => renderView("home"));

function renderView(viewId) {
  currentView = viewId;
  const rows = viewId === "home" ? DATA.home : DATA.views[viewId];
  if (!rows) return;

  setActiveSidebarItem(viewId === "home" ? null : viewId);
  updateBreadcrumb(viewId);

  const tbody = document.getElementById("tree");
  tbody.innerHTML = "";

  for (const row of rows) {
    tbody.appendChild(makeRow(row));
  }
}

function updateBreadcrumb(viewId) {
  const el = document.getElementById("breadcrumb");
  if (viewId === "home") { el.innerHTML = ""; return; }
  const views = DATA.views[viewId];
  if (!views) return;
  // collect parent rows for breadcrumb
  const parents = views.filter(r => r.role === "parent").reverse();
  let html = `<span onclick="renderView('home')">home</span>`;
  for (const p of parents) {
    html += ` › <span onclick="renderView('${p.node_id}')">${esc(p.description)}</span>`;
  }
  const sel = views.find(r => r.role === "selected");
  if (sel) html += ` › <strong>${esc(sel.description)}</strong>`;
  el.innerHTML = html;
}

function makeRow(row) {
  if (row.role === "sentinel") {
    const div = document.createElement("div");
    div.className = "sentinel-card";
    div.textContent = "  — roots";
    return div;
  }

  const card = document.createElement("div");
  card.className = "card";
  if (row.role === "selected") card.classList.add("selected");
  if (row.role === "child" || row.role === "home_root" || row.role === "parent") {
    card.classList.add("clickable");
    card.addEventListener("click", () => renderView(row.node_id));
  }

  card.appendChild(makeDescLine(row));
  if (row.comment) card.appendChild(makeCommentLine(row));
  if (row.pulse_label || row.when_label) card.appendChild(makeMetaLine(row));

  return card;
}

// ── Line 1: connector + description ───────────────────────────────────────────

function makeDescLine(row) {
  const line = document.createElement("div");
  line.className = "card-line1";

  if (row.role === "selected") {
    line.innerHTML = `<span class="selected-glyph">▶ </span>`
      + `<span class="desc-selected">${(row.bullet ? row.bullet + " " : "") + esc(row.description)}</span>`;
    return line;
  }

  if (row.role === "home_root") {
    line.innerHTML = `<span>  </span>`
      + `<span class="desc-d0">${(row.bullet ? row.bullet + " " : "") + esc(row.description)}</span>`;
    return line;
  }

  const segments = treePrefix(row.depth, row.index, row.items_depths, row.role === "parent", row.bullet);
  let html = `<span>  </span>`;
  for (const [text, level] of segments) {
    html += `<span class="${level >= 2 ? "connector-deep" : "connector"}">${esc(text)}</span>`;
  }
  const descCls = row.depth === 0 ? "desc-d0" : row.depth >= 2 ? "desc-d2" : "desc-d1";
  html += `<span class="${descCls}">${(row.bullet ? " " : "") + esc(row.description)}</span>`;
  if (row.also_labels && row.also_labels.length) {
    html += `<span class="also">  ← ${esc(row.also_labels.join(", "))}</span>`;
  }
  line.innerHTML = html;
  return line;
}

// ── Line 2: comment ────────────────────────────────────────────────────────────

function makeCommentLine(row) {
  const line = document.createElement("div");
  line.className = "card-line2";
  // indent to align under the description text (past the connector prefix)
  const indent = indentForRow(row);
  line.innerHTML = `<span style="flex-shrink:0">${indent}</span>`
    + `<span class="card-comment">${esc(row.comment)}</span>`;
  return line;
}

// ── Line 3: pulse + when ───────────────────────────────────────────────────────

function makeMetaLine(row) {
  const line = document.createElement("div");
  line.className = "card-line3";
  const indent = indentForRow(row);

  let pulseHtml = "";
  if (row.pulse_label) {
    const stripped = row.pulse_label.trimStart();
    let cls = "pulse-active";
    if (stripped.startsWith("!!!")) cls = "pulse-overdue";
    else if (stripped.startsWith("!")) cls = "pulse-forgotten";
    pulseHtml = `<span class="card-pulse ${cls}">${esc(row.pulse_label)}</span>`;
  }

  let whenHtml = "";
  if (row.when_label) {
    if (row.is_closed) {
      const reason = row.close_reason || "done";
      const glyphs = { done: "✓", discarded: "✗", active: "▸", forgotten: "·", overdue: "!" };
      const colorMap = { done: "when-done", discarded: "when-discarded", overdue: "when-overdue", forgotten: "when-overdue" };
      const glyph = glyphs[reason] || "✓";
      const cls = colorMap[reason] || "when-done";
      const label = row.when_label;
      if (label.includes("· was")) {
        const [main, suffix] = label.split("· was");
        whenHtml = `<span class="card-when ${cls}">${glyph} ${esc(main.trimEnd())}</span>`
                 + `<span class="connector">  · was${esc(suffix)}</span>`;
      } else {
        whenHtml = `<span class="card-when ${cls}">${glyph} ${esc(label)}</span>`;
      }
    } else {
      whenHtml = `<span class="card-when when-open">${esc(row.when_label)}</span>`;
    }
  }

  line.innerHTML = `<span style="flex-shrink:0">${indent}</span>`
    + `<span class="card-meta">${pulseHtml}${whenHtml}</span>`;
  return line;
}

// ── Indent helper: spaces to align lines 2-3 under the description ─────────────

function indentForRow(row) {
  if (row.role === "selected" || row.role === "home_root") return "    ";
  const segments = treePrefix(row.depth, row.index, row.items_depths, row.role === "parent", "");
  // each segment is 4 chars; leading "  " + segments chars, replace connectors with spaces
  const connectorWidth = segments.reduce((n, [t]) => n + t.length, 0);
  return "  " + " ".repeat(connectorWidth) + (row.bullet ? "  " : "");
}

// ── Tree connector logic (mirrors render.py _tree_prefix_segments) ─────────────

function treePrefix(depth, index, itemsDepths, reverse, bullet) {
  function hasSiblingAt(lvl) {
    const scan = reverse
      ? Array.from({length: index}, (_, i) => index - 1 - i)
      : Array.from({length: itemsDepths.length - index - 1}, (_, i) => index + 1 + i);
    for (const j of scan) {
      if (itemsDepths[j] < lvl) return false;
      if (itemsDepths[j] === lvl) return true;
    }
    return false;
  }

  const end = bullet || " ";
  const segments = [];
  for (let lvl = 1; lvl < depth; lvl++) {
    segments.push(["│   ".replace(/ $/, hasSiblingAt(lvl) ? "│   " : "    ").slice(0,4), lvl]);
    // simpler: push the right string directly
    segments[segments.length - 1] = [hasSiblingAt(lvl) ? "│   " : "    ", lvl];
  }
  if (depth >= 1) {
    if (reverse) {
      segments.push([hasSiblingAt(depth) ? "├──" + end : "╭──" + end, depth]);
    } else {
      segments.push([hasSiblingAt(depth) ? "├──" + end : "╰──" + end, depth]);
    }
  }
  return segments;
}

// ── Util ───────────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Sidebar collapse ───────────────────────────────────────────────────────────

document.getElementById("sidebar-header").addEventListener("click", () => {
  const sidebar = document.getElementById("sidebar");
  const btn = document.getElementById("toggle-btn");
  const collapsed = sidebar.classList.toggle("collapsed");
  btn.textContent = collapsed ? "›" : "‹";
});

// ── Boot ───────────────────────────────────────────────────────────────────────

loadData();
</script>
</body>
</html>
