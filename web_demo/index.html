<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pfq</title>
<style>
  :root {
    --bg:          #0d1b2a;
    --bg-panel:    #111f2e;
    --bg-card:     #131f2e;
    --fg:          #d4cdb8;
    --fg-dim:      #4a5a6a;
    --fg-mid:      #8a9aaa;
    --border:      #1e3248;
    --border-sel:  #2e5070;
    --accent:      #2e4a66;
    --selected-bg: #182638;

    --c-done:      #7ec87f;
    --c-discarded: #555555;
    --c-overdue:   #c47a7a;
    --c-forgotten: #9b8a3a;
    --c-active:    #7ab8d4;

    --font: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
    --radius: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    min-width: 180px;
    background: var(--bg-panel);
    border-right: 1px solid var(--accent);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .2s ease, min-width .2s ease;
    flex-shrink: 0;
  }
  #sidebar.collapsed { width: 36px; min-width: 36px; }
  #sidebar.collapsed #search-wrap,
  #sidebar.collapsed #node-list { display: none; }

  #sidebar-header {
    padding: 8px 10px;
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  #sidebar-header:hover { color: var(--fg-mid); }
  #sidebar.collapsed #sidebar-title { display: none; }
  #toggle-btn { font-size: 14px; }

  #search-wrap {
    padding: 6px 8px;
    border-bottom: 1px solid var(--accent);
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    padding: 3px 6px;
    outline: none;
  }
  #search:focus { border-color: var(--c-active); }

  #node-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .node-item {
    padding: 4px 12px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
    color: var(--fg-mid);
  }
  .node-item:hover  { background: var(--accent); color: var(--fg); }
  .node-item.active { background: var(--selected-bg); color: var(--fg); }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    flex-shrink: 0;
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--accent);
  }
  #home-btn {
    flex-shrink: 0;
    padding: 2px 8px;
    font-size: 12px;
    font-family: var(--font);
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--fg-mid);
    border-radius: 3px;
    cursor: pointer;
  }
  #home-btn:hover { border-color: var(--c-active); color: var(--fg); }
  #breadcrumb {
    flex: 1;
    font-size: 11px;
    color: var(--fg-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #breadcrumb span { cursor: pointer; }
  #breadcrumb span:hover { color: var(--fg-mid); }

  /* ── Viewport + slide panels ── */
  #viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 12px 14px 32px;
    will-change: transform;
  }
  .panel.enter-from-right { transform: translateX(100%); }
  .panel.enter-from-left  { transform: translateX(-100%); }
  .panel.sliding {
    transition: transform .22s cubic-bezier(.4,0,.2,1);
  }
  .panel.slide-out-left  { transform: translateX(-28%); }
  .panel.slide-out-right { transform: translateX(100%); }

  /* ── Node cards ── */
  .node-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-card);
    margin-bottom: 6px;
    overflow: hidden;
  }
  .node-card.role-selected {
    border-color: var(--border-sel);
  }
  .node-card.role-parent {
    opacity: .75;
  }

  .card-body {
    padding: 7px 10px 5px;
  }
  .node-card.clickable > .card-body { cursor: pointer; }
  .node-card.clickable > .card-body:hover { background: var(--selected-bg); }

  .card-desc {
    font-size: 14px;
    color: var(--fg);
    display: flex;
    align-items: baseline;
    gap: 5px;
  }
  .role-selected .card-desc  { font-weight: bold; }
  .role-home_root .card-desc { font-weight: bold; }
  .role-parent .card-desc    { color: var(--fg-mid); font-size: 13px; }

  .card-bullet {
    color: var(--fg-dim);
    flex-shrink: 0;
  }
  .card-selected-glyph {
    color: var(--fg);
    flex-shrink: 0;
  }
  .card-also {
    font-size: 11px;
    color: #505050;
    margin-left: 4px;
  }

  .card-comment {
    font-size: 12px;
    color: #505a60;
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 2px;
  }
  .pulse-overdue  { color: var(--c-overdue); }
  .pulse-forgotten{ color: var(--c-forgotten); }
  .pulse-active   { color: var(--c-active); }
  .when-done      { color: var(--c-done); }
  .when-discarded { color: var(--c-discarded); }
  .when-overdue   { color: var(--c-overdue); }
  .when-open      { color: #5a9aaa; }

  /* children container — indented, left border */
  .card-children {
    border-top: 1px solid var(--border);
    padding: 6px 6px 4px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  /* deeper nesting: border gets dimmer */
  .card-children .card-children {
    border-left: 1px solid var(--border);
    margin-left: 2px;
    padding-left: 8px;
  }

  /* parent nesting — content at top, label at bottom */
  .card-parents {
    padding: 6px 6px 0 6px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .node-card.role-parent {
    display: flex;
    flex-direction: column;
  }
  /* the inner slot sits above the parent's own label */
  .card-inner {
    order: -1;
    margin-bottom: 4px;
  }
  /* parent body sits at the bottom */
  .node-card.role-parent > .card-body {
    border-top: 1px solid var(--border);
    padding-top: 5px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <span id="sidebar-title">pfq</span>
    <span id="toggle-btn">‹</span>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="search…" autocomplete="off" spellcheck="false">
  </div>
  <div id="node-list"></div>
</nav>

<main id="main">
  <div id="topbar">
    <button id="home-btn">⌂</button>
    <div id="breadcrumb"></div>
  </div>
  <div id="viewport"></div>
</main>

<script>
// ── Data ───────────────────────────────────────────────────────────────────────

let DATA = null;
let currentView = "home";

async function loadData() {
  const resp = await fetch("data.json");
  DATA = await resp.json();
  populateNodeList(DATA.nodes);
  const startId = location.hash.slice(1) || "home";
  const validId = startId === "home" || DATA.views[startId] ? startId : "home";
  showPanel(validId, "none");
  history.replaceState({ viewId: validId }, "", `#${validId}`);
}

// ── Sidebar ────────────────────────────────────────────────────────────────────

function populateNodeList(nodes) {
  const list = document.getElementById("node-list");
  for (const n of nodes) {
    const el = document.createElement("div");
    el.className = "node-item";
    el.textContent = n.description || n.node_id;
    el.dataset.nodeId = n.node_id;
    el.addEventListener("click", () => navigateTo(n.node_id));
    list.appendChild(el);
  }
}

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  for (const el of document.querySelectorAll(".node-item"))
    el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? "" : "none";
});

document.getElementById("sidebar-header").addEventListener("click", () => {
  const sidebar = document.getElementById("sidebar");
  const collapsed = sidebar.classList.toggle("collapsed");
  document.getElementById("toggle-btn").textContent = collapsed ? "›" : "‹";
});

function setActiveSidebarItem(nodeId) {
  for (const el of document.querySelectorAll(".node-item"))
    el.classList.toggle("active", el.dataset.nodeId === nodeId);
}

// ── Navigation ─────────────────────────────────────────────────────────────────

document.getElementById("home-btn").addEventListener("click", () => navigateTo("home"));
window.addEventListener("popstate", e => showPanel(e.state?.viewId ?? "home", "back"));

function navigateTo(viewId) {
  if (viewId === currentView) return;
  // going "back" if target is a parent of current (it's higher in the tree)
  const direction = isAncestorView(viewId, currentView) ? "back" : "forward";
  showPanel(viewId, direction);
  history.pushState({ viewId }, "", `#${viewId}`);
}

function isAncestorView(candidateId, currentId) {
  if (candidateId === "home") return true;
  if (currentId === "home") return false;
  const rows = DATA.views[currentId] || [];
  return rows.some(r => r.role === "parent" && r.node_id === candidateId);
}

function showPanel(viewId, direction) {
  const rows = viewId === "home" ? DATA.home : DATA.views[viewId];
  if (!rows) return;

  const viewport = document.getElementById("viewport");
  const oldPanel = viewport.querySelector(".panel");

  const newPanel = document.createElement("div");
  newPanel.className = "panel";
  buildPanel(newPanel, rows, viewId);

  if (direction === "none" || !oldPanel) {
    oldPanel?.remove();
    viewport.appendChild(newPanel);
  } else {
    newPanel.classList.add(direction === "back" ? "enter-from-left" : "enter-from-right");
    viewport.appendChild(newPanel);
    newPanel.getBoundingClientRect(); // force reflow
    oldPanel.classList.add("sliding", direction === "back" ? "slide-out-right" : "slide-out-left");
    newPanel.classList.add("sliding");
    newPanel.style.transform = "translateX(0)";
    newPanel.addEventListener("transitionend", () => {
      oldPanel.remove();
      newPanel.classList.remove("sliding", "enter-from-left", "enter-from-right");
    }, { once: true });
  }

  currentView = viewId;
  setActiveSidebarItem(viewId === "home" ? null : viewId);
  updateBreadcrumb(viewId);
}

// ── Panel builder ──────────────────────────────────────────────────────────────

function buildPanel(panel, rows, viewId) {
  if (viewId === "home") {
    buildNestedCards(panel, rows);
    return;
  }

  // node view: selected + children, then wrap upward in parent cards
  const selectedRow = rows.find(r => r.role === "selected");
  const childRows   = rows.filter(r => r.role === "child");
  // parents sorted farthest-first (depth desc), so we wrap from outside in
  const parentRows  = rows.filter(r => r.role === "parent")
                          .sort((a, b) => b.depth - a.depth);

  // innermost content: selected card with its children
  let inner = makeCard(selectedRow);
  if (childRows.length) inner.appendChild(buildChildrenContainer(childRows, 1));

  // wrap each parent around the inner content, outermost last
  for (const pRow of parentRows) {
    const pCard = makeCard(pRow);
    const slot = document.createElement("div");
    slot.className = "card-inner card-parents";
    slot.appendChild(inner);
    pCard.insertBefore(slot, pCard.firstChild);
    inner = pCard;
  }

  panel.appendChild(inner);
}

function buildNestedCards(container, rows) {
  // rows is a flat list of home_root + child rows with depth info
  // build recursive nesting from the flat list
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    if (row.role === "sentinel") { i++; continue; }
    const card = makeCard(row);
    i++;
    // collect immediate depth-1 children that follow this root
    if (row.role === "home_root") {
      const childSlice = [];
      while (i < rows.length && rows[i].role === "child") {
        childSlice.push(rows[i]);
        i++;
      }
      if (childSlice.length) {
        card.appendChild(buildChildrenContainer(childSlice, 1));
      }
    }
    container.appendChild(card);
  }
}

function buildChildrenContainer(childRows, depth) {
  const container = document.createElement("div");
  container.className = "card-children";

  let i = 0;
  while (i < childRows.length) {
    const row = childRows[i];
    if (row.depth !== depth) { i++; continue; }
    const card = makeCard(row);
    i++;
    // collect deeper children that follow
    const sub = [];
    while (i < childRows.length && childRows[i].depth > depth) {
      sub.push(childRows[i]);
      i++;
    }
    if (sub.length) card.appendChild(buildChildrenContainer(sub, depth + 1));
    container.appendChild(card);
  }
  return container;
}

// ── Card element ───────────────────────────────────────────────────────────────

function makeCard(row) {
  const card = document.createElement("div");
  card.className = `node-card role-${row.role}`;

  const isClickable = row.role !== "selected";
  if (isClickable) {
    card.classList.add("clickable");
  }

  const body = document.createElement("div");
  body.className = "card-body";
  if (isClickable) body.addEventListener("click", () => navigateTo(row.node_id));

  // description line
  const descEl = document.createElement("div");
  descEl.className = "card-desc";
  if (row.role === "selected") {
    descEl.innerHTML = `<span class="card-selected-glyph">▶</span> `
      + `<span>${(row.bullet ? esc(row.bullet) + " " : "") + esc(row.description)}</span>`;
  } else {
    let html = "";
    if (row.bullet) html += `<span class="card-bullet">${esc(row.bullet)}</span> `;
    html += `<span>${esc(row.description)}</span>`;
    if (row.also_labels?.length)
      html += `<span class="card-also">← ${esc(row.also_labels.join(", "))}</span>`;
    descEl.innerHTML = html;
  }
  body.appendChild(descEl);

  // comment
  if (row.comment) {
    const c = document.createElement("div");
    c.className = "card-comment";
    c.textContent = row.comment;
    body.appendChild(c);
  }

  // pulse + when
  if (row.pulse_label || row.when_label) {
    const meta = document.createElement("div");
    meta.className = "card-meta";
    meta.innerHTML = pulseHtml(row) + whenHtml(row);
    body.appendChild(meta);
  }

  card.appendChild(body);
  return card;
}

function pulseHtml(row) {
  if (!row.pulse_label) return "";
  const s = row.pulse_label.trimStart();
  const cls = s.startsWith("!!!") ? "pulse-overdue" : s.startsWith("!") ? "pulse-forgotten" : "pulse-active";
  return `<span class="${cls}">${esc(row.pulse_label)}</span>`;
}

function whenHtml(row) {
  if (!row.when_label) return "";
  if (row.is_closed) {
    const reason = row.close_reason || "done";
    const glyphs   = { done: "✓", discarded: "✗", active: "▸", forgotten: "·", overdue: "!" };
    const colorMap = { done: "when-done", discarded: "when-discarded", overdue: "when-overdue", forgotten: "when-overdue" };
    const glyph = glyphs[reason] || "✓";
    const cls   = colorMap[reason] || "when-done";
    const label = row.when_label;
    if (label.includes("· was")) {
      const [main, suffix] = label.split("· was");
      return `<span class="${cls}">${glyph} ${esc(main.trimEnd())}  · was${esc(suffix)}</span>`;
    }
    return `<span class="${cls}">${glyph} ${esc(label)}</span>`;
  }
  return `<span class="when-open">${esc(row.when_label)}</span>`;
}

// ── Breadcrumb ─────────────────────────────────────────────────────────────────

function updateBreadcrumb(viewId) {
  const el = document.getElementById("breadcrumb");
  if (viewId === "home") { el.innerHTML = ""; return; }
  const rows = DATA.views[viewId] || [];
  const parents = rows.filter(r => r.role === "parent").reverse();
  let html = `<span onclick="navigateTo('home')">home</span>`;
  for (const p of parents)
    html += ` › <span onclick="navigateTo('${p.node_id}')">${esc(p.description)}</span>`;
  const sel = rows.find(r => r.role === "selected");
  if (sel) html += ` › <strong>${esc(sel.description)}</strong>`;
  el.innerHTML = html;
}

// ── Util ───────────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

loadData();
</script>
</body>
</html>
